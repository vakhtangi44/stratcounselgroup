version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: stratcounsel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: stratcounsel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://stratcounsel:${POSTGRES_PASSWORD}@postgres:5432/stratcounsel
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - postgres
    networks:
      - internal
      - web

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
      - ./uploads:/app/uploads:ro
    depends_on:
      - app
    networks:
      - web

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
    networks:
      - internal
    entrypoint: >
      /bin/sh -c "
      while true; do
        sleep 86400;
        PGPASSWORD=$$POSTGRES_PASSWORD pg_dump -h postgres -U stratcounsel stratcounsel |
        gzip > /backups/backup-$$(date +%Y%m%d).sql.gz;
        find /backups -name '*.sql.gz' -mtime +7 -delete;
      done"
    depends_on:
      - postgres

volumes:
  postgres_data:
  certbot_www:
  certbot_conf:

networks:
  internal:
    driver: bridge
  web:
    driver: bridge
